<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Add Donation - SayNo2Hunger</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" 
         rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/donation-add.css}">
</head>

<body th:attr="data-success=${success}, data-error=${error}">

    <nav class="donation-navbar">
        <div class="donation-logo">✨ SayNo2Hunger</div>
            <div class="donation-nav-right">
                <a href="/donor/dashboard" class="donation-nav-btn">🏠 Dashboard</a>
                <a href="/logout" class="donation-nav-btn">🚪 Logout</a>
            </div>
    </nav>


    <div class="form-container">
        <h2>🍎 Add New Food Donation</h2>

        <form th:action="@{/donor/add}" th:object="${donation}" method="post">
            
            <div class="form-row">

                <div class="form-group">
                    <label>🍚 Food Name</label>
                    <input type="text" 
                           th:field="*{foodName}"
                           placeholder="e.g. Cooked Rice, Biryani, Roti..."
                           required>
                </div>

                <div class="form-group">
                    <label>📂 Category</label>

                    <select th:field="*{foodCategory}" required>
                        <option value="">Select Category</option>
                        <option th:each="cat : ${foodCategories}"
                                th:value="${cat}"
                                th:text="${cat}">
                        </option>
                    </select>

                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>🥗 Type</label>

                    <select th:field="*{foodType}" required>
                        <option value="">Select Type</option>
                        <option value="VEG">🌱 Veg</option>
                        <option value="NON_VEG">🍗 Non-Veg</option>
                        <option value="PACKAGED">📦 Packaged</option>
                    </select>

                </div>

                <div class="form-group">
                    <label>⚖️ Quantity</label>
                    <input type="number"
                           th:field="*{quantity}"
                           min="0.1"
                           step="0.1"
                           placeholder="e.g. 2.5"
                           required>
                    <small>In kilograms</small>
                </div>
            </div>

            <div class="form-group full-width">
                <label>📍 Pickup Address</label>

                <textarea th:field="*{pickupAddress}"
                          placeholder="Enter complete address with landmarks, building name, floor no., etc."
                          required>
                </textarea>

                <label>🏙️ City</label>

                <input type="text"
                    th:field="*{city}"
                    placeholder="e.g. Indore"
                    required>
                <small>Make it easy for volunteers to find you!</small>

            </div>

            <div class="form-row">
               
                <div class="form-group">

                    <label>📞 Contact Number</label>

                    <input type="tel"
                           th:field="*{contactNumber}"
                           placeholder="+91 9876543210"
                           required>

                    <small>Must start with +91</small>

                </div>

                <div class="form-group">

                    <label>⏰ Available Until</label>

                    <input type="datetime-local"
                           th:field="*{expiryTime}"
                           th:min="${#temporals.format(T(java.time.LocalDateTime).now().plusMinutes(30), 
                           'yyyy-MM-dd''T''HH:mm')}"
                           required>

                    <small>Minimum 30 minutes from now</small>

                </div>
            </div>

            <button type="submit" class="btn-primary">
                🚀 Share Food & Spread Happiness
            </button>
        </form>
    </div>

     <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:src="@{/js/alerts.js}"></script>
    
</body>
</html>
