<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Profile - SayNoHunger</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" 
       rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/volunteer-profile.css}">
</head>

<body th:attr="data-success=${success}, data-error=${error}">

    <nav class="navbar">
        <div class="logo">✨ SayNo2Hunger</div>
        <div class="nav-right">
            <a href="/volunteer/dashboard" class="nav-btn dashboard-btn">
                🏠Dashboard
            </a>

            <a href="/logout" class="nav-btn logout-btn">
                🚪Logout
            </a>

        </div>
    </nav>

    <main class="profile-main">
        <!-- Profile Card -->
        <div class="profile-container">
            <div class="profile-card">
                <div class="profile-header">
                    <div class="profile-avatar">👤</div>
                    <h2 class="profile-name" th:text="${profile.user.name}"></h2>
                </div>

                <div class="profile-details">

                    <div class="detail-item">
                        <span class="detail-label">📧 Email</span>
                        <span class="detail-value" th:text="${profile.user.email}"></span>
                    </div>

                    <div class="detail-item">
                        <span class="detail-label">📱 Phone</span>
                        <span class="detail-value" th:text="${profile.user.phone}"></span>
                    </div>

                    <div class="detail-item">
                        <span class="detail-label">Gender</span>
                        <span class="detail-value" th:text="${profile.gender}"></span>
                    </div>

                    <div class="detail-item">
                        <span class="detail-label">🏠 Address</span>
                        <span class="detail-value" th:text="${profile.address}"></span>
                    </div>

                    <div class="detail-item">
                        <span class="detail-label">📍 City</span>
                        <span class="detail-value" th:text="${profile.city}"></span>
                    </div>
                    
                    <div class="detail-item">
                        <span class="detail-label">📮 Pincode</span>
                        <span class="detail-value" th:text="${profile.pincode}"></span>
                    </div>

                    <div class="detail-item">
                        <span class="detail-label">🪪 Aadhaar</span>

                        <img th:if="${profile.aadhaarImagePath != null}"
                            th:src="@{'/' + ${profile.aadhaarImagePath}}"
                            alt="Aadhaar Photo"
                            style="width:200px;border-radius:10px">

                    </div>
                </div>

                <!-- Update Button -->
                <a th:href="@{/volunteer/edit}" class="update-btn">
                    <button class="premium-btn">✏️ Update Profile</button>
                </a>
            </div>
        </div>
    </main>
     <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:src="@{/js/alerts.js}"></script>
</body>
</html>
