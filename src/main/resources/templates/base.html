<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title ?: 'SayNo2Hunger'}">SayNo2Hunger</title>
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">

    <style>
    body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #f7f3ec;
    color: #333;
    }

    .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 8%;
        background: linear-gradient(90deg, #FFD700 0%, #FFA500 30%, #FF8C00 70%, #FF6F00 100%);
        position: fixed;
        width: 100%;
        top: 0;
        box-shadow: 0 4px 25px rgba(255, 147, 0, 0.4);
        z-index: 1000;
        backdrop-filter: blur(10px);
    }

    .nav-left {
        flex: 1;
    }

    .logo {
        font-size: 1.8rem;
        font-weight: 800;
        color: #000000 !important;
        text-decoration: none;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        letter-spacing: -0.5px;
    }

    .nav-right {
        display: flex;
        gap: 12px;
        align-items: center;
    }

    .nav-btn {
        padding: 10px 22px;
        border-radius: 25px;
        font-weight: 600;
        font-size: 0.9rem;
        text-decoration: none;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        border: 2px solid transparent;
    }

    .profile-btn {
        background: linear-gradient(45deg, #8B5CF6, #A78BFA);
        color: white !important;
    }

    .logout-btn {
        background: linear-gradient(45deg, #6B7280, #9CA3AF);
        color: white !important;
    }

    .nav-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(0,0,0,0.25);
    }


    .logout-btn:hover {
        background: linear-gradient(45deg, #4B5563, #6B7280);
    }

    /* Mobile responsive */
    @media (max-width: 768px) {
        .navbar {
            padding: 12px 5%;
        }
        
        .logo {
            font-size: 1.5rem;
        }
        
        .nav-right {
            gap: 8px;
        }
        
        .nav-btn {
            padding: 8px 16px;
            font-size: 0.85rem;
        }
    }

    /* HERO */
    .hero {
        text-align: center;
        padding: 80px 20px;
        background: white;
    }

    .hero h1 {
        font-size: 40px;
        margin-bottom: 10px;
    }

    .subtitle {
        font-size: 18px;
        color: #666;
    }

    /* ACTIONS */
    .actions {
        display: flex;
        justify-content: center;
        gap: 30px;
        padding: 60px 20px;
    }

    .action-card {
        background: white;
        padding: 40px 30px;
        border-radius: 16px;
        width: 180px;
        text-align: center;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    .action-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 35px rgba(0,0,0,0.08);
    }

    .icon {
        font-size: 28px;
        margin-bottom: 10px;
    }

    /* IMPACT SECTION */
    .impact {
        padding: 60px 8%;
    }

    .impact h2 {
        margin-bottom: 30px;
    }

    .timeline-card {
        background: white;
        padding: 25px;
        border-radius: 12px;
        margin-bottom: 20px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }

    .timeline-card h3 {
        margin: 0 0 10px 0;
    }

    .date {
        font-size: 14px;
        color: #777;
    }

    .empty {
        text-align: center;
        color: #777;
    }
    </style>
</head>

<body th:attr="data-success=${success}, data-error=${error}">

    <!-- NAVBAR -->
    <nav class="navbar" th:fragment="navbar">
        <div class="logo">✨ SayNo2Hunger</div>
        <ul class="nav-links">

            <li>
                <a th:href="@{/}" class="nav-btn login-btn">Home</a>
            </li>

            <li class="dropdown">
                <a href="#" class="nav-btn">Register ▾</a>

                <div class="dropdown-menu">
                    <a th:href="@{/donor/create}">Register as Donor</a>
                    <a th:href="@{/volunteer/create}">Register as Volunteer</a>
                </div>

            </li>

             <li>
                <a th:href="@{/logout}" class="nav-btn login-btn">Logout</a>
            </li>

        </ul>
        <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    </nav>

    <!-- MAIN CONTENT -->
    <div th:replace="${content}">
      
    </div>

    <!-- FOOTER -->
    <footer class="footer" th:fragment="footer">
        © 2026 SayNo2Hunger | Built with ❤️
    </footer>

    <!-- SCRIPTS -->
    <script th:src="@{/js/main.js}"></script>

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>

        AOS.init({ duration: 1000, once: true });
        function toggleMenu() {
            document.querySelector('.nav-links').classList.toggle('active');
        }

    </script>

     <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script th:src="@{/js/alerts.js}"></script>
    
</body>
</html>
